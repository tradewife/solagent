[agent]
name = "solagent"
poll_interval_secs = 30
log_level = "info"

[chains]
[chains.solana]
rpc_urls = ["https://api.mainnet-beta.solana.com"]
ws_url = "wss://api.mainnet-beta.solana.com"
helius_api_key = ""
private_key_bs58 = ""

[risk]
# Tuned for small wallet (< 1 SOL, ~$150)
max_position_size_usd = 15.0
max_portfolio_risk_pct = 25.0
max_daily_loss_usd = 15.0
max_drawdown_pct = 15.0
max_open_positions = 3
default_stop_loss_pct = 15.0
default_take_profit_pct = 300.0
cooldown_secs = 300
safety_score_threshold = 60
trailing_stop_pct = 15.0

[strategies]
active_strategies = ["whale_consensus", "accumulation", "launch_momentum", "volume_spike", "social"]
confluence_threshold = 35.0
min_signal_count = 2
progressive_threshold_failures = 20
progressive_threshold_step = 5.0
progressive_threshold_floor = 25.0

[data]
jupiter_api_url = "https://api.jup.ag/swap/v1"
dexscreener_base_url = "https://api.dexscreener.com"
birdeye_base_url = "https://public-api.birdeye.so"
zerion_base_url = "https://api.zerion.io/v1"
# zerion_api_key — set in local.toml (free at dashboard.zerion.io, 60K calls/mo)
